# AWS Gateway configuration file in TOML format.
version = "3"
region = "{{.Region}}"

# Enable verbose debugging
debug = false

# API request throttling (per-account, per-action token bucket)
[ratelimit]
enabled = false
rate = 20           # Default sustained requests per second per account per action
burst = 100         # Default maximum burst capacity

[ratelimit.action.RunInstances]
rate = 2
burst = 40

[ratelimit.action.TerminateInstances]
rate = 2
burst = 40

[ratelimit.action.StartInstances]
rate = 2
burst = 40

[ratelimit.action.StopInstances]
rate = 2
burst = 40

# Per-account service quotas (caps standing infrastructure per account).
# Default-off so existing gateways are unaffected; the sandbox config opts in.
[quota]
enabled     = false   # sandbox config sets true
vcpus       = 8
vpcs        = 8
subnets     = 16
eips        = 2
volumes_gib = 100
