# Base image definition. Ubuntu 26.04 is "resolute" — confirmed against the
# archive and by a real build; the release postdates mkosi 25.3, so the
# codename is not one the toolchain can be assumed to know.
[Distribution]
Distribution=ubuntu
Release=resolute
Repositories=main,universe

[Output]
Format=disk
ImageId=spinifex

[Build]
# No loop devices: repart writes the partition table offline, which is what
# lets the build run unprivileged.
RepartOffline=yes

[Content]
# Every image built from this base is a bootable UEFI disk (D11). mkosi
# installs the kernel below and owns the bootloader/ESP itself, so boot-time
# tweaks are expressed as mkosi settings rather than sed patches against
# extlinux/GRUB. Bootloader= defaults to systemd-boot, the native fit for
# Format=disk + RepartOffline=yes.
Bootable=yes
# mkosi's own installer, not debootstrap, builds the image: it pulls in only
# Packages= plus their dependency closure, not a debootstrap "Priority:
# required/important" baseline. apt is listed explicitly because of that —
# without it, the image has no package manager of its own at all, which
# breaks anything (including profile postinst scripts) that shells out to
# apt-get/apt-mark/dpkg expecting a normal Ubuntu system.
#
# systemd-boot-efi carries the actual EFI stub binaries bootctl installs
# into the ESP (systemd itself only carries bootctl). Unlike on Debian it is
# in Ubuntu's universe component, not main.
Packages=systemd
         udev
         linux-image-generic
         apt
         systemd-boot-efi

# linux-image-generic drags in every linux-firmware-* split package
# (wifi/bluetooth/AMD+Intel graphics — none of it relevant to a headless VM
# guest). Left at the default, mkosi's per-kernel modules initrd embeds all
# of it into the UKI, which blew the UKI out to ~880MB and overflowed the
# default 512M ESP outright. Exclude= has to be paired with Include=: per
# mkosi's own docs Include= only ever adds on top of "everything" unless
# Exclude= first takes everything away, so Exclude=.* is what actually does
# the trimming here and Include=default (mkosi-initrd's own curated module
# list for booting a generic VM: virtio/storage/fs) adds back only what
# boot actually needs. This is a boot-time fix, not just a size one.
KernelModulesInitrdExclude=.*
KernelModulesInitrdInclude=default
