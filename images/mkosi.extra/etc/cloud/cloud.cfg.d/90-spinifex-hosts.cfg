# cloud-init renames the guest to its IMDS-derived hostname (ip-172-31-0-4)
# but, at its default manage_etc_hosts: false, never adds a matching /etc/hosts
# entry — so every sudo call warns "unable to resolve host ip-172-31-0-4" and
# anything resolving its own hostname fails. A stock cloud image carries a
# hosts entry for the name it was built with; an image built from scratch has
# neither that nor a way to know the name in advance, since it is assigned per
# launch.
#
# "localhost" (not "true") is the narrow setting: cloud-init maintains only the
# 127.0.1.1 line for the current hostname and leaves the rest of the file
# alone, which is the Debian/Ubuntu convention. User-data still overrides this
# if a node wants to manage the file itself.
manage_etc_hosts: localhost
