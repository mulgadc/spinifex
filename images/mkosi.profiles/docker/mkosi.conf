# docker profile — Docker CE, layered on the base image.
#
# Split out of gpu-nvidia deliberately. Docker is not a GPU concern: it is
# what the standalone ubuntu-gpu-nvidia AMI exists to offer (`docker run
# --gpus all`), while the EKS and ECS node images run k3s or containerd and
# reach the GPU through CDI, never a Docker daemon.
#
# Keeping the two fused was not merely wasteful on the node images, it was
# fatal for ECS: Docker's repository ships containerd.io, which
# Conflicts/Replaces the Ubuntu containerd the ecs profile installs, so
# gpu-nvidia + ecs could not resolve at all.
[Content]
# curl/gnupg/ca-certificates are for mkosi.postinst.chroot: Docker CE is not
# in the Ubuntu archive, so its repository cannot be added via Packages=.
Packages=curl
         gnupg
         ca-certificates

[Build]
# mkosi.postinst.chroot installs from the Docker CE repository.
WithNetwork=yes
