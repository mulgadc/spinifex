# ecs profile — Spinifex ECS container-instance node.
#
# Composes with base alone for the CPU image, or with gpu-nvidia for the GPU
# one; the profile itself is GPU-agnostic and carries only the ordering drop-in
# that applies when the CDI unit is present.
#
# This profile is why Docker had to leave gpu-nvidia. It installs Ubuntu's
# containerd, and Docker's repository ships containerd.io, which
# Conflicts/Replaces it — so while the two were fused, gpu-nvidia + ecs could
# not resolve at all.
[Content]
# containerd is the runtime (its own systemd unit ships with the package, so
# none is authored here); runc is the OCI runtime under it;
# containernetworking-plugins supplies the bridge plugin the baked conflist
# names; iproute2 is needed for task networking.
Packages=containerd
         runc
         containernetworking-plugins
         ca-certificates
         curl
         iproute2

# staging/ carries the Go binary built on the host — see eks-agent for why it
# is not built in the container. 10-bridge.conflist and the units are shared
# with the pre-mkosi image that still consumes them, so they are referenced
# where they live rather than copied.
ExtraTrees=../../staging/ecs:/
           ../../../scripts/images/ecs-agent/10-bridge.conflist:/etc/cni/net.d/10-bridge.conflist
           ../../../scripts/images/ecs-agent-gpu/ecs-agent.service:/etc/systemd/system/ecs-agent.service
           ../../../scripts/images/ecs-agent-gpu/ecs-ca-install.service:/etc/systemd/system/ecs-ca-install.service
