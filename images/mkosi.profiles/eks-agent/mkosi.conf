# eks-agent profile — the K3s agent (worker) side of an EKS node.
#
# Layered on eks-common, which carries the k3s binary and the role-agnostic
# node services. GPU images compose exactly base + gpu-nvidia + eks-common +
# eks-agent: they are hardcoded agent-only and never run the control plane, so
# no role selector is involved.
#
# staging/ holds build outputs rather than checked-in files — mkosi-build.sh
# compiles the Go binaries into it on the host before the container starts,
# because the pinned toolchain image carries no Go and go.mod is the single
# source of truth for the version.
[Content]
ExtraTrees=../../staging/eks-agent:/
           ../../../scripts/images/eks-node/k3s-agent-prestart.sh:/usr/local/sbin/k3s-agent-prestart
           ../../../scripts/images/eks-node-gpu/k3s-agent.service:/etc/systemd/system/k3s-agent.service
