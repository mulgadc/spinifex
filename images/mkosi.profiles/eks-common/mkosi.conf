# eks-common profile — what every EKS node needs regardless of its role.
#
# The role (server|agent) stays a runtime selector, so this profile holds the
# k3s binary and the node services that are role-agnostic; eks-agent and
# eks-server add only what is specific to one side. The split follows the
# Alpine image's own division: its manifest bakes exactly mulga-ebs-byid,
# mulga-eks-provider-id and mulga-vpc-mtu at image build and leaves the rest
# for the first-boot selector to enable.
#
# Sources are referenced where they already live rather than copied in. The
# .sh helpers are shared verbatim with the Alpine image that still consumes
# them, so a copy here would be a second version to keep in step — the drift
# Stage A removed a hand-copied helper to prevent. The .service files sit under
# scripts/images/eks-node-gpu/ only because that is the one existing systemd
# image; they are neither GPU- nor role-specific, and they move into this tree
# when scripts/images/ is deleted at cutover.
[Content]
# K3s pulls in cgroups + iptables; jq builds the bootstrap-message JSON
# envelopes. Ubuntu's iptables package carries ip6tables too, so it is not
# named separately as it is on Alpine.
#
# initramfs-tools is deliberately NOT carried over from the pre-mkosi package
# list: mkosi assembles the UKI and its own initrd, so nothing here runs
# update-initramfs.
Packages=ca-certificates
         curl
         jq
         iptables
         conntrack
         cgroup-tools

ExtraTrees=../../../scripts/images/eks-node/mulga-ebs-byid.sh:/usr/local/sbin/mulga-ebs-byid
           ../../../scripts/images/eks-node/mulga-eks-provider-id.sh:/usr/local/sbin/mulga-eks-provider-id
           ../../../scripts/images/eks-node/mulga-vpc-mtu.sh:/usr/local/sbin/mulga-vpc-mtu
           ../../../scripts/images/eks-node-gpu/mulga-ebs-byid.service:/etc/systemd/system/mulga-ebs-byid.service
           ../../../scripts/images/eks-node-gpu/mulga-eks-provider-id.service:/etc/systemd/system/mulga-eks-provider-id.service
           ../../../scripts/images/eks-node-gpu/mulga-vpc-mtu.service:/etc/systemd/system/mulga-vpc-mtu.service
           ../../../scripts/images/eks-node-gpu/99-mulga-ebs-byid.rules:/etc/udev/rules.d/99-mulga-ebs-byid.rules

[Build]
# mkosi.postinst.chroot downloads the pinned k3s release.
WithNetwork=yes
