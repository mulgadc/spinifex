# gpu-nvidia profile — NVIDIA GPU guest support, layered on the base image.
#
# Collapses the three verbatim copies of install_nvidia_gpu_stack()
# (ubuntu-gpu-nvidia-setup.sh, eks-node-gpu/setup.sh, ecs-agent-gpu/setup.sh)
# into one profile. Only GPU concerns live here; everything every image
# needs (systemd, the kernel, UEFI boot) stays in the base mkosi.conf, and
# Docker — which is the standalone GPU AMI's concern, not the GPU's — lives
# in the docker profile.
[Distribution]
# nvidia-dkms-*-server-open and nvidia-utils-*-server ship in Ubuntu's
# restricted component, which is off by default.
Repositories=restricted

[Content]
# linux-headers-generic matches whatever kernel linux-image-generic (base)
# pulled in, so DKMS has something to build against. build-essential is not
# a hard dependency of the dkms/nvidia-dkms packages (WithRecommends=
# defaults off, matching --no-install-recommends), so it is named
# explicitly rather than assumed to already be present.
#
# nvidia-dkms-595-server-open is the GSP/open-kernel-module variant, not the
# closed one: Blackwell-generation GPUs (RTX PRO 6000) refuse to initialize
# under the closed module — RmInitAdapter fails with "requires use of the
# NVIDIA open kernel modules" (dmesg NVRM error 0x22). nvidia-utils has no
# separate open variant (userspace tools only).
#
# 595 is pinned deliberately: the number is a branch alias, not a driver
# version (nvidia-dkms-535-server installs 580.126.20), so resolving the
# highest available branch at build time can silently change what actually
# gets installed between two builds of identical config. Bumping this is a
# deliberate edit, not something to automate.
#
# curl/gnupg/ca-certificates are for mkosi.postinst.chroot, which adds the
# nvidia-container-toolkit repository — it does not ship in the Ubuntu
# archive, so it cannot be pulled in via Packages= alone.
#
# zstd: the kernel expects modules compressed with it (dkms tries to delete
# a stale "*.ko.zst" on rebuild); without the binary present DKMS silently
# falls back to installing the module uncompressed instead of failing.
Packages=linux-headers-generic
         build-essential
         nvidia-dkms-595-server-open
         nvidia-utils-595-server
         curl
         gnupg
         ca-certificates
         zstd

[Build]
# mkosi.postinst.chroot needs network access to add and install from the
# Docker CE and nvidia-container-toolkit repositories.
WithNetwork=yes
