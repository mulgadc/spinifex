---
# Restore a dev-snapshot bundle: stop services, wipe the snapshot path
# set, untar the bundle, refresh CA trust, restart.
#
# Required: -e snapshot_name=<name>
# Optional: -e snapshot_dir=/some/path
- name: Dev restore — wipe + untar snapshot + restart
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../vars/defaults.yml

  roles:
    - restore
