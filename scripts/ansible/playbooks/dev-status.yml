---
# Read-only health snapshot for a Spinifex dev node. Never mutates state.
# Run any time the operator wants to know "is my box healthy?" — pairs with
# dev-preflight (run before install) as the post-install / running-system
# diagnostic.
- name: Dev status — health snapshot (read-only)
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../vars/defaults.yml

  roles:
    - status
