---
- name: build — spinifex (make build)
  ansible.builtin.command:
    cmd: make build
    chdir: "{{ spinifex_root }}"
  changed_when: true

- name: build — viperblock nbdkit plugin (make go_build_nbd)
  ansible.builtin.command:
    cmd: make go_build_nbd
    chdir: "{{ mulga_root }}/viperblock"
  changed_when: true

- name: build — detect microVM build script (present only on direct-boot branches)
  ansible.builtin.stat:
    path: "{{ spinifex_root }}/scripts/build-microvm-image.sh"
  register: build_microvm_script

- name: build — microVM kernel + initramfs (direct-boot LBs)
  ansible.builtin.command:
    cmd: make build-microvm-image
    chdir: "{{ spinifex_root }}"
  changed_when: true
  when: build_microvm_script.stat.exists

- name: build — verify build artifacts present
  ansible.builtin.stat:
    path: "{{ item }}"
  register: build_artifacts
  loop:
    - "{{ spinifex_root }}/bin/spx"
    - "{{ mulga_root }}/viperblock/lib/nbdkit-viperblock-plugin.so"

- name: build — assert artifacts exist
  ansible.builtin.assert:
    that: item.stat.exists
    fail_msg: "Missing build artifact: {{ item.item }}"
  loop: "{{ build_artifacts.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: build — stage tarball contents (mirrors dev-install.sh)
  ansible.builtin.shell: |
    set -e
    STAGING=$(mktemp -d)
    trap 'rm -rf "$STAGING"' EXIT
    cp "{{ spinifex_root }}/bin/spx" "$STAGING/spx"
    cp "{{ mulga_root }}/viperblock/lib/nbdkit-viperblock-plugin.so" "$STAGING/"
    cp "{{ spinifex_root }}/scripts/setup-ovn.sh" "$STAGING/"
    mkdir -p "$STAGING/systemd"
    cp "{{ spinifex_root }}/build/systemd/"* "$STAGING/systemd/"
    mkdir -p "$STAGING/scripts"
    cp "{{ spinifex_root }}/build/scripts/"* "$STAGING/scripts/"
    cp "{{ spinifex_root }}/build/logrotate/spinifex" "$STAGING/logrotate-spinifex"
    # microVM artifacts ship only when the branch built them.
    if [ -f "{{ spinifex_root }}/build/microvm/vmlinuz" ] && [ -f "{{ spinifex_root }}/build/microvm/initramfs.cpio.gz" ]; then
        mkdir -p "$STAGING/microvm"
        cp "{{ spinifex_root }}/build/microvm/vmlinuz" "$STAGING/microvm/"
        cp "{{ spinifex_root }}/build/microvm/initramfs.cpio.gz" "$STAGING/microvm/"
    fi
    tar czf "{{ build_tarball_path }}" -C "$STAGING" .
  changed_when: true

- name: build — summary
  ansible.builtin.debug:
    msg: "Built spx + nbdkit plugin{{ ' + microvm artifacts' if build_microvm_script.stat.exists else '' }}, tarball at {{ build_tarball_path }}"
