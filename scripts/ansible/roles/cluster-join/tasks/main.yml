---
- name: cluster-join — assert this is a join host
  ansible.builtin.assert:
    that: spinifex_node_role == "join"
    fail_msg: "cluster-join role must only run against hosts in the [join] group"

# Promote inventory hostvars over vars/defaults.yml (see cluster-init).
- name: cluster-join — promote inventory node identity over defaults.yml
  ansible.builtin.set_fact:
    spinifex_node_name: "{{ hostvars[inventory_hostname]['spinifex_node_name'] }}"

- name: cluster-join — pull join token from init host
  ansible.builtin.set_fact:
    cluster_join_token: "{{ hostvars[cluster_init_host]['cluster_join_token'] }}"

- name: cluster-join — assert token present
  ansible.builtin.assert:
    that: cluster_join_token | length > 0
    fail_msg: "join token missing — init host did not export cluster_join_token"

- name: cluster-join — run spx admin join (retry up to 5 times)
  become: true
  ansible.builtin.command:
    cmd: >-
      spx admin join
      --node {{ spinifex_node_name }}
      --bind {{ spinifex_wan_ip }}
      --cluster-bind {{ spinifex_wan_ip }}
      --host {{ cluster_init_host }}:{{ cluster_formation_port }}
      --token {{ cluster_join_token }}
      --region {{ spinifex_region }}
      --az {{ spinifex_az }}
  register: cluster_join_result
  retries: 5
  delay: 3
  until: cluster_join_result.rc == 0

# CA install + service start handled by cluster-bootstrap.yml plays that
# run after all joins complete and init has written multi-node configs.
