---
- name: cluster-post — locate ssh public key for import
  ansible.builtin.find:
    paths: "{{ ansible_env.HOME }}/.ssh"
    patterns:
      - spinifex-key.pub
      - tf-user-*.pub
    file_type: file
  register: cluster_post_ssh_pubkey

- name: cluster-post — fail when no public key found
  ansible.builtin.assert:
    that: cluster_post_ssh_pubkey.files | length > 0
    fail_msg: "no public key in ~/.ssh — needed for spinifex-key import"

- name: cluster-post — set pubkey path fact
  ansible.builtin.set_fact:
    cluster_post_pubkey_path: "{{ cluster_post_ssh_pubkey.files[0].path }}"

- name: cluster-post — check whether spinifex-key already imported
  ansible.builtin.command:
    cmd: "{{ spinifex_aws_cli }} ec2 describe-key-pairs --key-names spinifex-key"
  register: cluster_post_key_check
  changed_when: false
  failed_when: false

- name: cluster-post — import spinifex-key (if absent)
  ansible.builtin.command:
    cmd: >-
      {{ spinifex_aws_cli }} ec2 import-key-pair
      --key-name spinifex-key
      --public-key-material fileb://{{ cluster_post_pubkey_path }}
  register: cluster_post_key_import
  retries: 10
  delay: 6
  until: cluster_post_key_import.rc == 0
  when: cluster_post_key_check.rc != 0

- name: cluster-post — locate ubuntu cloud image (26.04 preferred, 24.04 fallback)
  ansible.builtin.stat:
    path: "{{ item }}"
  register: cluster_post_ubuntu_stat
  loop:
    - "{{ ansible_env.HOME }}/images/ubuntu-26.04.img"
    - "{{ ansible_env.HOME }}/images/ubuntu-24.04.img"

- name: cluster-post — pick first available image
  ansible.builtin.set_fact:
    cluster_post_ubuntu_image: "{{ (cluster_post_ubuntu_stat.results | selectattr('stat.exists') | map(attribute='item') | list | first) | default('') }}"

- name: cluster-post — fail when no ubuntu image present
  ansible.builtin.assert:
    that: cluster_post_ubuntu_image | length > 0
    fail_msg: "no ubuntu-{24,26}.04.img in ~/images/ — gold image must stage it"

- name: cluster-post — derive ubuntu version from image filename
  ansible.builtin.set_fact:
    cluster_post_ubuntu_version: "{{ cluster_post_ubuntu_image | regex_search('ubuntu-([0-9]+\\.[0-9]+)\\.img', '\\1') | first }}"

- name: cluster-post — check whether ubuntu AMI already imported
  ansible.builtin.command:
    cmd: >-
      {{ spinifex_aws_cli }} ec2 describe-images
      --owners self
      --filters Name=name,Values=ubuntu-{{ cluster_post_ubuntu_version }}
  register: cluster_post_ami_check
  changed_when: false
  failed_when: false

- name: cluster-post — import ubuntu AMI (if absent)
  ansible.builtin.command:
    cmd: >-
      {{ spinifex_spx_cli }} admin images import
      --file {{ cluster_post_ubuntu_image }}
      --arch x86_64
      --distro ubuntu
      --version {{ cluster_post_ubuntu_version }}
      --boot-mode uefi
  when:
    - cluster_post_ami_check.rc != 0
       or "ubuntu-" + cluster_post_ubuntu_version not in cluster_post_ami_check.stdout

- name: cluster-post — slurp final admin creds from ~/.aws/credentials
  # Source of truth: SetupAWSCredentials writes the FINAL admin keys here.
  # Init log shows obsolete keys (multi-node path silently regenerates them
  # after the initial print — see cmd/spinifex/cmd/admin.go writeBootstrapFiles
  # called twice in the multi-node flow).
  ansible.builtin.slurp:
    src: "{{ ansible_env.HOME }}/.aws/credentials"
  register: cluster_post_aws_creds_raw

- name: cluster-post — extract admin access/secret keys from spinifex profile
  ansible.builtin.set_fact:
    cluster_post_admin_access_key: >-
      {{ (cluster_post_aws_creds_raw.content | b64decode
          | regex_search('\[spinifex\][^\[]*aws_access_key_id\s*=\s*(\S+)', '\1')
          | first) | default('') }}
    cluster_post_admin_secret_key: >-
      {{ (cluster_post_aws_creds_raw.content | b64decode
          | regex_search('\[spinifex\][^\[]*aws_secret_access_key\s*=\s*(\S+)', '\1')
          | first) | default('') }}

- name: cluster-post — assert creds parsed
  ansible.builtin.assert:
    that:
      - cluster_post_admin_access_key | length > 0
      - cluster_post_admin_secret_key | length > 0
    fail_msg: "could not parse admin keys from {{ ansible_env.HOME }}/.aws/credentials [spinifex] profile"

- name: cluster-post — ensure local .creds dir exists
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../.creds"
    state: directory
    mode: "0700"

- name: cluster-post — write creds to operator workstation
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/../.creds/{{ cluster_env }}.txt"
    mode: "0600"
    content: |
      # Spinifex cluster admin credentials — {{ cluster_env }}
      # Generated: {{ ansible_facts['date_time']['iso8601'] }}
      # Init host: {{ cluster_init_host }}
      #
      # UI:        https://{{ cluster_init_host }}:3000
      # AWS API:   https://{{ cluster_init_host }}:4432
      # Region:    {{ spinifex_region }}
      #
      # Login (admin user / AWS profile spinifex):
      AWS_ACCESS_KEY_ID={{ cluster_post_admin_access_key }}
      AWS_SECRET_ACCESS_KEY={{ cluster_post_admin_secret_key }}

# Per-env AWS profile in operator's ~/.aws/credentials so tofu / aws CLI can
# target this cluster via AWS_PROFILE=spinifex-{{ cluster_env }}. blockinfile
# marker keeps re-runs idempotent — replaces the block in place, never
# duplicates. Does not touch the user's existing [spinifex] profile (single-
# node dev). Tofu side: provider "aws" { profile = "spinifex-env1" ... }.
- name: cluster-post — ensure local ~/.aws dir exists
  delegate_to: localhost
  become: false
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/.aws"
    state: directory
    mode: "0700"

- name: cluster-post — ensure local ~/.aws/credentials exists
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/.aws/credentials"
    content: ""
    force: false
    mode: "0600"

- name: cluster-post — upsert spinifex-{{ cluster_env }} profile in local ~/.aws/credentials
  delegate_to: localhost
  become: false
  ansible.builtin.blockinfile:
    path: "{{ lookup('env', 'HOME') }}/.aws/credentials"
    marker: "# {mark} SPINIFEX-{{ cluster_env | upper }} MANAGED BLOCK"
    block: |
      [spinifex-{{ cluster_env }}]
      aws_access_key_id = {{ cluster_post_admin_access_key }}
      aws_secret_access_key = {{ cluster_post_admin_secret_key }}
      region = {{ spinifex_region }}
      ca_bundle = {{ playbook_dir }}/../.creds/{{ cluster_env }}-ca.pem
      endpoint_url = https://{{ cluster_init_host }}:4432

- name: cluster-post — slurp cluster CA from init host
  ansible.builtin.slurp:
    src: "{{ spinifex_ca_src }}"
  register: cluster_post_ca_raw
  become: true

- name: cluster-post — write CA pem to operator workstation
  delegate_to: localhost
  become: false
  ansible.builtin.copy:
    dest: "{{ playbook_dir }}/../.creds/{{ cluster_env }}-ca.pem"
    mode: "0644"
    content: "{{ cluster_post_ca_raw.content | b64decode }}"

- name: cluster-post — resolve absolute paths for summary
  delegate_to: localhost
  become: false
  ansible.builtin.command: "readlink -f {{ playbook_dir }}/../.creds"
  register: cluster_post_creds_abs
  changed_when: false

- name: cluster-post — summary
  ansible.builtin.debug:
    msg: |
      Post-bootstrap done:
        spinifex-key:    {{ 'imported now' if (cluster_post_key_import.changed | default(false)) else 'already present' }}
        ubuntu AMI:      ubuntu-{{ cluster_post_ubuntu_version }}
        admin creds:     {{ cluster_post_creds_abs.stdout }}/{{ cluster_env }}.txt
        CA cert:         {{ cluster_post_creds_abs.stdout }}/{{ cluster_env }}-ca.pem
        AWS profile:     spinifex-{{ cluster_env }} (in ~/.aws/credentials)
        UI URL:          https://{{ cluster_init_host }}:3000
        Access Key:      {{ cluster_post_admin_access_key }}
        Tofu usage:      AWS_PROFILE=spinifex-{{ cluster_env }} tofu plan
