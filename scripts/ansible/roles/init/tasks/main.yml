---
- name: init — base admin-init flags
  ansible.builtin.set_fact:
    init_base_flags: >-
      --force
      --region {{ spinifex_region }}
      --az {{ spinifex_az }}
      --node {{ spinifex_node_name }}
      --nodes {{ spinifex_node_count }}

- name: init — no-external opt-out
  ansible.builtin.set_fact:
    init_external_flags: "--no-external"
  when: spinifex_external_no_external | bool

- name: init — assert pool range supplied when mode=pool
  ansible.builtin.assert:
    that:
      - spinifex_external_pool_start | length > 0
      - spinifex_external_pool_end | length > 0
    fail_msg: |
      spx admin init requires --external-pool when --external-mode=pool.
      Set spinifex_external_pool_start / spinifex_external_pool_end in
      scripts/ansible/vars/defaults.yml, or pass:
        -e spinifex_external_pool_start=192.168.1.150
        -e spinifex_external_pool_end=192.168.1.250
      Pass -e spinifex_external_no_external=true to skip external networking.
  when:
    - not (spinifex_external_no_external | bool)
    - spinifex_external_mode == 'pool'

- name: init — pool-mode external flags
  ansible.builtin.set_fact:
    init_external_flags: >-
      --external-mode=pool
      --external-pool={{ spinifex_external_pool_start }}-{{ spinifex_external_pool_end }}
      {% if spinifex_external_gateway | length > 0 %}--external-gateway={{ spinifex_external_gateway }}{% endif %}
      {% if spinifex_external_prefix_len | string | length > 0 %}--external-prefix-len={{ spinifex_external_prefix_len }}{% endif %}
      {% if spinifex_external_gateway_ip | length > 0 %}--gateway-ip={{ spinifex_external_gateway_ip }}{% endif %}
  when:
    - not (spinifex_external_no_external | bool)
    - spinifex_external_mode == 'pool'

- name: init — assemble full flag string
  ansible.builtin.set_fact:
    init_all_flags: "{{ init_base_flags }} {{ init_external_flags | default('') }}"

- name: init — run spx admin init
  become: true
  ansible.builtin.command: "spx admin init {{ init_all_flags }}"
  changed_when: true

- name: init — copy CA to system trust
  become: true
  ansible.builtin.copy:
    src: "{{ spinifex_ca_src }}"
    dest: "{{ spinifex_ca_trust_path }}"
    mode: "0644"
    remote_src: true

- name: init — rebuild CA bundle (not --fresh — preserve other CAs)
  become: true
  ansible.builtin.command: update-ca-certificates
  changed_when: true

- name: init — start spinifex.target
  become: true
  ansible.builtin.systemd:
    name: spinifex.target
    state: started

# systemctl start returns as soon as units activate; awsgw still wires up
# to NATS + daemons after that. Bash start-dev.sh has internal wait loops;
# systemd path does not. Poll a benign call until gateway is fully ready.
- name: init — wait for AWS gateway readiness
  ansible.builtin.command: "{{ spinifex_aws_cli }} ec2 describe-regions"
  register: init_gw_ready
  until: init_gw_ready.rc == 0
  retries: 30
  delay: 2
  changed_when: false

- name: init — summary
  ansible.builtin.debug:
    msg: |
      Init complete:
        region={{ spinifex_region }}, az={{ spinifex_az }}, node={{ spinifex_node_name }}
        external_mode={{ 'disabled' if (spinifex_external_no_external | bool) else spinifex_external_mode }}
        spinifex.target: started
        CA: {{ spinifex_ca_trust_path }}
