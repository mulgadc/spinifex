---
- name: smoketest — resolve invoking user's home
  ansible.builtin.getent:
    database: passwd
    key: "{{ spinifex_invoking_user }}"

- name: smoketest — set user home fact
  ansible.builtin.set_fact:
    smoketest_user_home: "{{ ansible_facts['getent_passwd'][spinifex_invoking_user][4] }}"

- name: smoketest — generate SSH key if absent
  become: true
  become_user: "{{ spinifex_invoking_user }}"
  ansible.builtin.command:
    cmd: ssh-keygen -t ed25519 -f {{ smoketest_user_home }}/.ssh/spinifex-key -N ""
    creates: "{{ smoketest_user_home }}/.ssh/spinifex-key"

- name: smoketest — import SSH key to spinifex
  ansible.builtin.command: >-
    {{ spinifex_aws_cli }} ec2 import-key-pair
    --key-name spinifex-key
    --public-key-material fileb://{{ smoketest_user_home }}/.ssh/spinifex-key.pub
  register: smoketest_keypair
  until: >-
    smoketest_keypair.rc == 0 or
    'InvalidKeyPair.Duplicate' in (smoketest_keypair.stderr | default(''))
  retries: 10
  delay: 3
  changed_when: "'InvalidKeyPair.Duplicate' not in (smoketest_keypair.stderr | default(''))"
  failed_when:
    - smoketest_keypair.rc != 0
    - "'InvalidKeyPair.Duplicate' not in (smoketest_keypair.stderr | default(''))"

- name: smoketest — detect architecture
  ansible.builtin.set_fact:
    smoketest_arch: "{{ 'arm64' if ansible_facts['architecture'] in ['aarch64','arm64'] else 'x86_64' }}"

- name: smoketest — resolve local image path
  ansible.builtin.set_fact:
    smoketest_local_image_path: "{{ smoketest_local_image | expanduser }}"
  vars:
    smoketest_local_image: "{{ spinifex_smoketest_local_image | replace('~', smoketest_user_home) }}"

- name: smoketest — check for local image
  ansible.builtin.stat:
    path: "{{ smoketest_local_image_path }}"
  register: smoketest_local_img

- name: smoketest — import AMI from local file
  ansible.builtin.command: >-
    {{ spinifex_spx_cli }} admin images import
    --file {{ smoketest_local_image_path }}
    --distro {{ spinifex_smoketest_distro }}
    --version {{ spinifex_smoketest_version }}
    --arch {{ smoketest_arch }}
    --boot-mode uefi
  register: smoketest_import_local
  until: >-
    smoketest_import_local.rc == 0 or
    'already exists' in (smoketest_import_local.stderr | default(''))
  retries: 5
  delay: 3
  changed_when: smoketest_import_local.rc == 0
  failed_when:
    - smoketest_import_local.rc != 0
    - "'already exists' not in (smoketest_import_local.stderr | default(''))"
  when: smoketest_local_img.stat.exists

- name: smoketest — import AMI by name (fallback)
  ansible.builtin.command: >-
    {{ spinifex_spx_cli }} admin images import
    --name {{ spinifex_smoketest_distro }}-{{ spinifex_smoketest_version }}-{{ smoketest_arch }}
  register: smoketest_import_remote
  until: >-
    smoketest_import_remote.rc == 0 or
    'already exists' in (smoketest_import_remote.stderr | default(''))
  retries: 5
  delay: 3
  changed_when: smoketest_import_remote.rc == 0
  failed_when:
    - smoketest_import_remote.rc != 0
    - "'already exists' not in (smoketest_import_remote.stderr | default(''))"
  when: not smoketest_local_img.stat.exists

- name: smoketest — detect CPU vendor for instance type choice
  ansible.builtin.command: grep -q AuthenticAMD /proc/cpuinfo
  register: smoketest_amd
  changed_when: false
  failed_when: false

- name: smoketest — pick instance type
  ansible.builtin.set_fact:
    smoketest_instance_type: "{{ 't3a.small' if smoketest_amd.rc == 0 else 't3.small' }}"

- name: smoketest — find AMI ID
  ansible.builtin.command: "{{ spinifex_aws_cli }} ec2 describe-images --query Images[0].ImageId --output text"
  register: smoketest_ami
  until: smoketest_ami.rc == 0
  retries: 10
  delay: 3
  changed_when: false

- name: smoketest — find public subnet (best-effort)
  ansible.builtin.command: >-
    {{ spinifex_aws_cli }} ec2 describe-subnets
    --filters Name=map-public-ip-on-launch,Values=true
    --query Subnets[0].SubnetId
    --output text
  register: smoketest_subnet_public
  changed_when: false
  failed_when: false

- name: smoketest — fallback to first subnet (best-effort)
  ansible.builtin.command: "{{ spinifex_aws_cli }} ec2 describe-subnets --query Subnets[0].SubnetId --output text"
  register: smoketest_subnet_any
  changed_when: false
  failed_when: false
  when:
    - smoketest_subnet_public.rc != 0 or smoketest_subnet_public.stdout in ['', 'None']

- name: smoketest — resolve subnet id (empty string if none)
  ansible.builtin.set_fact:
    smoketest_subnet_id: >-
      {%- if smoketest_subnet_public.rc == 0 and smoketest_subnet_public.stdout not in ['', 'None'] -%}
      {{ smoketest_subnet_public.stdout }}
      {%- elif (smoketest_subnet_any.rc | default(1)) == 0 and (smoketest_subnet_any.stdout | default('')) not in ['', 'None'] -%}
      {{ smoketest_subnet_any.stdout }}
      {%- else -%}{%- endif -%}

- name: smoketest — skip launch if no subnet (fresh install with no user VPC)
  ansible.builtin.debug:
    msg: |
      No subnet found — skipping instance launch.
      Services are up, CA is trusted, keypair imported, AMI imported.
      Create a VPC+subnet via tofu examples (or `aws ec2 create-vpc` /
      `create-subnet`) then re-run if you want a live instance.
  when: smoketest_subnet_id | trim == ''

- name: smoketest — launch instance
  ansible.builtin.command: >-
    {{ spinifex_aws_cli }} ec2 run-instances
    --image-id {{ smoketest_ami.stdout }}
    --instance-type {{ smoketest_instance_type }}
    --key-name spinifex-key
    --subnet-id {{ smoketest_subnet_id | trim }}
    --count 1
    --query Instances[0].InstanceId
    --output text
  register: smoketest_instance
  until: smoketest_instance.rc == 0
  retries: 5
  delay: 3
  changed_when: true
  when: smoketest_subnet_id | trim != ''

- name: smoketest — wait for instance running (proves launch path works)
  ansible.builtin.command: >-
    {{ spinifex_aws_cli }} ec2 describe-instances
    --instance-ids {{ smoketest_instance.stdout }}
    --query Reservations[0].Instances[0].State.Name
    --output text
  register: smoketest_instance_state
  until: smoketest_instance_state.stdout | trim == 'running'
  retries: 30
  delay: 2
  changed_when: false
  failed_when: false
  when:
    - smoketest_subnet_id | trim != ''
    - smoketest_instance.stdout is defined
    - smoketest_instance.stdout | trim != ''

- name: smoketest — terminate instance (cleanup)
  ansible.builtin.command: >-
    {{ spinifex_aws_cli }} ec2 terminate-instances
    --instance-ids {{ smoketest_instance.stdout }}
  register: smoketest_terminate
  until: smoketest_terminate.rc == 0
  retries: 5
  delay: 3
  changed_when: true
  failed_when: false
  when:
    - smoketest_subnet_id | trim != ''
    - smoketest_instance.stdout is defined
    - smoketest_instance.stdout | trim != ''

- name: smoketest — summary
  ansible.builtin.debug:
    msg: |
      Smoketest complete:
        AMI:           {{ smoketest_ami.stdout }}
        Subnet:        {{ smoketest_subnet_id | trim | default('(none — launch skipped)', true) }}
        Instance type: {{ smoketest_instance_type }}
        Instance ID:   {{ smoketest_instance.stdout | default('(skipped)', true) }}
        Final state:   {{ smoketest_instance_state.stdout | default('(skipped)', true) | trim }}
        Terminated:    {{ 'yes' if smoketest_terminate.rc | default(1) == 0 else 'no (launch skipped or terminate failed)' }}
