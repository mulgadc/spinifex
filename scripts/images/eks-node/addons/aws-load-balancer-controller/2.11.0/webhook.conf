# Admission-webhook serving-cert SANs for this addon. render_addon mints a
# self-signed cert for these names (via eks-webhook-cert) and embeds it as the
# webhook Secret + every caBundle. Presence of this file is what opts a bundle
# into webhook cert-gen.
WEBHOOK_CN=aws-load-balancer-webhook-service.kube-system.svc
WEBHOOK_DNS=aws-load-balancer-webhook-service.kube-system.svc,aws-load-balancer-webhook-service.kube-system.svc.cluster.local
