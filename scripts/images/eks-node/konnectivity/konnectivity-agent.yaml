# Konnectivity agent DaemonSet — the worker half of the apiserver egress proxy.
# Each agent dials OUT to the konnectivity-server (fronted by the cluster NLB at
# __KONN_HOST__:8132) and holds a reverse tunnel to EVERY apiserver replica
# (--proxy-server-count). apiserver→pod/kubelet/webhook egress rides back down
# that tunnel, so an HA control plane reaches worker pod IPs with no L4-VIP
# fan-out gap. Staged into the K3s auto-deploy dir by k3s.initd, which fills the
# __KONN_HOST__ / __KONN_SERVER_COUNT__ / __KONN_AGENT_IMAGE__ tokens at boot.
#
# Runs on workers only: it carries no toleration for the control-plane
# CriticalAddonsOnly=true:NoExecute taint, so it is never scheduled onto the CP
# nodes (which run the server, not an agent).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: konnectivity-agent
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: spinifex-eks
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: konnectivity-agent
  namespace: kube-system
  labels:
    k8s-app: konnectivity-agent
    app.kubernetes.io/managed-by: spinifex-eks
spec:
  selector:
    matchLabels:
      k8s-app: konnectivity-agent
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        k8s-app: konnectivity-agent
    spec:
      serviceAccountName: konnectivity-agent
      priorityClassName: system-node-critical
      # hostNetwork so the agent reaches the NLB over the node network and
      # identifies itself to the server by the node's own IP (the address the
      # apiserver dials back through for kubelet/pod egress).
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: konnectivity-agent
          image: __KONN_AGENT_IMAGE__
          command:
            - /proxy-agent
          args:
            - --logtostderr=true
            - --ca-cert=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            - --proxy-server-host=__KONN_HOST__
            - --proxy-server-port=8132
            - --proxy-server-count=__KONN_SERVER_COUNT__
            - --service-account-token-path=/var/run/secrets/tokens/konnectivity-agent-token
            - --agent-identifiers=ipv4=$(HOST_IP)
            - --admin-server-port=8133
            - --health-server-port=8134
          env:
            - name: HOST_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          livenessProbe:
            httpGet:
              scheme: HTTP
              host: 127.0.0.1
              port: 8134
              path: /healthz
            initialDelaySeconds: 15
            timeoutSeconds: 15
          volumeMounts:
            - name: konnectivity-agent-token
              mountPath: /var/run/secrets/tokens
              readOnly: true
      volumes:
        - name: konnectivity-agent-token
          projected:
            sources:
              - serviceAccountToken:
                  path: konnectivity-agent-token
                  audience: system:konnectivity-server
